name: BAOS Build

on:
  # Triggered by upstream version poll finding a new HA release
  repository_dispatch:
    types:
      - upstream-update
      - baos-component-update

  # Triggered by a push to this repo's main branch (e.g. build scripts changed)
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - "upstream-versions.json"   # version bumps are handled by check-upstream

  # Manual trigger
  workflow_dispatch:
    inputs:
      boards:
        description: "Boards to build: empty = rpi5-64+rpi4-64 (default), 'all' = all boards, or comma-separated IDs"
        required: false
        default: ""
      reason:
        description: "Reason for manual build"
        required: false
        default: "manual"

permissions:
  contents: write
  packages: write

env:
  BAOS_BUILD_REPO: marimotica/baos-build
  BAOS_OS_REPO:   marimotica/ba-operating-system
  PYTHON_VERSION: "3.13"

jobs:
  # -----------------------------------------------------------------------
  # 1. Prepare: resolve versions, build builder image, generate board matrix
  # -----------------------------------------------------------------------
  prepare:
    name: Prepare build
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    outputs:
      haos_version:          ${{ steps.versions.outputs.haos }}
      core_version:          ${{ steps.versions.outputs.core }}
      baos_version:          ${{ steps.versions.outputs.baos }}
      trigger_source:        ${{ steps.versions.outputs.trigger_source }}
      version_dev:           ${{ steps.version_dev.outputs.version_dev }}
      matrix:                ${{ steps.generate_matrix.outputs.result }}
      build_container_image: ghcr.io/${{ github.repository_owner }}/haos-builder@${{ steps.build_haos_builder.outputs.digest }}
      self_signed_cert:      ${{ steps.generate_signing_key.outputs.self_signed_cert }}

    steps:
      - name: Checkout ba-operating-system
        uses: actions/checkout@v4
        with:
          repository: ${{ env.BAOS_OS_REPO }}
          token: ${{ secrets.BAOS_BUILD_TOKEN }}
          ref: baos-main

      - name: Read pinned upstream versions from baos-build
        id: versions
        run: |
          set -euo pipefail
          # Fetch upstream-versions.json from baos-build repo
          VERSIONS=$(curl -fsSL \
            -H "Authorization: token ${{ secrets.BAOS_BUILD_TOKEN }}" \
            "https://raw.githubusercontent.com/marimotica/baos-build/main/upstream-versions.json")

          HAOS=$(echo "$VERSIONS" | jq -r '.haos')
          CORE=$(echo "$VERSIONS" | jq -r '.core')

          # BAOS version = HAOS base + date-based dev suffix
          BAOS="${HAOS}+baos.$(date -u +%Y%m%d%H%M)"

          TRIGGER="${{ github.event_name }}"
          if [[ "$TRIGGER" == "repository_dispatch" ]]; then
            TRIGGER="${{ github.event.action }} (${{ github.event.client_payload.components || github.event.client_payload.component }})"
          fi

          echo "haos=${HAOS}"                  >> "$GITHUB_OUTPUT"
          echo "core=${CORE}"                  >> "$GITHUB_OUTPUT"
          echo "baos=${BAOS}"                  >> "$GITHUB_OUTPUT"
          echo "trigger_source=${TRIGGER}"     >> "$GITHUB_OUTPUT"

          echo "### Build versions"            >> "$GITHUB_STEP_SUMMARY"
          echo "| Component | Version |"       >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|"                      >> "$GITHUB_STEP_SUMMARY"
          echo "| HAOS base | ${HAOS} |"       >> "$GITHUB_STEP_SUMMARY"
          echo "| HA Core   | ${CORE} |"       >> "$GITHUB_STEP_SUMMARY"
          echo "| BAOS      | ${BAOS} |"       >> "$GITHUB_STEP_SUMMARY"
          echo "| Triggered by | ${TRIGGER} |" >> "$GITHUB_STEP_SUMMARY"

      - name: Generate development version suffix
        id: version_dev
        run: |
          version_dev="dev$(date --utc +'%Y%m%d')"
          echo "version_dev=${version_dev}" >> "$GITHUB_OUTPUT"

      - name: Set version suffix in checkout
        env:
          VERSION_DEV: ${{ steps.version_dev.outputs.version_dev }}
        run: |
          sed -i -E "s/(^VERSION_SUFFIX=\").*(\"$)/\1${VERSION_DEV}\2/" buildroot-external/meta

      - name: Create build matrix
        uses: actions/github-script@v7
        id: generate_matrix
        with:
          script: |
            const boards = require('./.github/workflows/matrix.json')
            const boardFilter = "${{ github.event.inputs.boards }}"
            if (boardFilter == "") {
              // Default: only build boards flagged as default (rpi5-64 and rpi4-64)
              const defaultBoards = boards.filter(b => b.default === true)
              console.log("Building default boards:", defaultBoards.map(b => b.id))
              return { "board": defaultBoards }
            }
            if (boardFilter == "all") {
              console.log("Building all boards")
              return { "board": boards }
            }
            const boardSet = new Set(boardFilter.split(",").map(s => s.trim()))
            const buildBoards = boards.filter(b => boardSet.has(b.id))
            console.log("Building subset:", buildBoards.map(b => b.id))
            return { "board": buildBoards }

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push haos-builder image
        uses: docker/build-push-action@v6
        id: build_haos_builder
        with:
          context: .
          file: Dockerfile
          tags: ghcr.io/${{ github.repository_owner }}/haos-builder
          cache-from: ghcr.io/${{ github.repository_owner }}/haos-builder:cache
          cache-to:   ghcr.io/${{ github.repository_owner }}/haos-builder:cache
          push: true

      - name: Generate self-signed RAUC certificate (no secrets present)
        id: generate_signing_key
        env:
          RAUC_CERTIFICATE: ${{ secrets.RAUC_CERTIFICATE }}
          RAUC_PRIVATE_KEY: ${{ secrets.RAUC_PRIVATE_KEY }}
        if: env.RAUC_CERTIFICATE == '' || env.RAUC_PRIVATE_KEY == ''
        run: |
          echo "::warning::RAUC certificate/key not found in secrets — building with self-signed cert."
          buildroot-external/scripts/generate-signing-key.sh cert.pem key.pem
          echo "self_signed_cert=true" >> "$GITHUB_OUTPUT"

      - name: Upload signing key artifact
        uses: actions/upload-artifact@v4
        if: steps.generate_signing_key.outcome == 'success'
        with:
          name: signing-key
          path: |
            cert.pem
            key.pem

  # -----------------------------------------------------------------------
  # 2. Sync the ba-operating-system fork with upstream HAOS tag
  # -----------------------------------------------------------------------
  sync-os-fork:
    name: Sync ba-operating-system with upstream HAOS ${{ needs.prepare.outputs.haos_version }}
    runs-on: ubuntu-22.04
    needs: prepare

    steps:
      - name: Checkout ba-operating-system
        uses: actions/checkout@v4
        with:
          repository: ${{ env.BAOS_OS_REPO }}
          token: ${{ secrets.BAOS_BUILD_TOKEN }}
          fetch-depth: 0
          ref: baos-main

      - name: Add upstream remote and fetch tag
        run: |
          git remote add upstream https://github.com/home-assistant/operating-system.git || true
          git fetch upstream tag "${{ needs.prepare.outputs.haos_version }}" --no-tags

      - name: Check if upstream tag already merged
        id: check_merge
        run: |
          if git merge-base --is-ancestor FETCH_HEAD HEAD 2>/dev/null; then
            echo "already_merged=true" >> "$GITHUB_OUTPUT"
            echo "HAOS ${{ needs.prepare.outputs.haos_version }} already in branch — skipping merge."
          else
            echo "already_merged=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Merge upstream tag into baos-main
        if: steps.check_merge.outputs.already_merged == 'false'
        run: |
          git config user.name  "baos-bot"
          git config user.email "baos-bot@users.noreply.github.com"
          git merge FETCH_HEAD \
            --no-ff \
            -m "merge: HAOS ${{ needs.prepare.outputs.haos_version }} into baos-main"
          git push origin baos-main

  # -----------------------------------------------------------------------
  # 3. Build BAOS OS images via Docker (mirrors upstream HAOS CI exactly)
  # -----------------------------------------------------------------------
  build:
    name: Build for ${{ matrix.board.id }}
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      packages: read
    needs:
      - prepare
      - sync-os-fork
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      - name: Checkout ba-operating-system
        uses: actions/checkout@v4
        with:
          repository: ${{ env.BAOS_OS_REPO }}
          token: ${{ secrets.BAOS_BUILD_TOKEN }}
          ref: baos-main
          submodules: true

      - name: Set version suffix
        env:
          VERSION_DEV: ${{ needs.prepare.outputs.version_dev }}
        run: |
          sed -i -E "s/(^VERSION_SUFFIX=\").*(\"$)/\1${VERSION_DEV}\2/" buildroot-external/meta

      - name: Add release PKI certs
        if: ${{ needs.prepare.outputs.self_signed_cert != 'true' }}
        env:
          RAUC_CERTIFICATE: ${{ secrets.RAUC_CERTIFICATE }}
          RAUC_PRIVATE_KEY: ${{ secrets.RAUC_PRIVATE_KEY }}
        run: |
          echo -e "-----BEGIN CERTIFICATE-----\n${RAUC_CERTIFICATE}\n-----END CERTIFICATE-----" > cert.pem
          echo -e "-----BEGIN PRIVATE KEY-----\n${RAUC_PRIVATE_KEY}\n-----END PRIVATE KEY-----" > key.pem

      - name: Get self-signed certificate
        if: ${{ needs.prepare.outputs.self_signed_cert == 'true' }}
        uses: actions/download-artifact@v4
        with:
          name: signing-key

      - name: Free disk space and prepare mount points
        run: |
          df -h
          sudo rm -rf /usr/local/lib/android/sdk/ndk
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo mkdir /mnt/cache
          sudo mkdir /mnt/output
          WORKSPACE_OWNER="$(stat -c '%U:%G' "${GITHUB_WORKSPACE}")"
          sudo ln -sf /mnt/output "${GITHUB_WORKSPACE}/output"
          sudo chown -R "${WORKSPACE_OWNER}" /mnt/cache
          sudo chown -R "${WORKSPACE_OWNER}" /mnt/output
          df -h

      - name: Restore compiler cache
        uses: actions/cache/restore@v4
        with:
          path: /mnt/cache/cc
          key: baos-cc-${{ matrix.board.id }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate build config
        uses: "./.github/actions/haos-builder-command"
        with:
          image: ${{ needs.prepare.outputs.build_container_image }}
          command: make ${{ matrix.board.defconfig }}_defconfig

      - name: Build
        uses: "./.github/actions/haos-builder-command"
        with:
          image: ${{ needs.prepare.outputs.build_container_image }}
          command: make

      - name: Check Linux config
        uses: "./.github/actions/haos-builder-command"
        with:
          image: ${{ needs.prepare.outputs.build_container_image }}
          command: |
            make BR2_CHECK_DOTCONFIG_OPTS="--github-format --strip-path-prefix=/build/" linux-check-dotconfig

      - name: Save compiler cache
        uses: actions/cache/save@v4
        with:
          path: /mnt/cache/cc
          key: baos-cc-${{ matrix.board.id }}-${{ github.run_id }}

      - name: Upload OS image artifact
        uses: actions/upload-artifact@v4
        with:
          name: baos_${{ matrix.board.id }}-${{ needs.prepare.outputs.baos_version }}
          path: |
            output/images/baos_${{ matrix.board.id }}-*.img.xz
            output/images/baos_${{ matrix.board.id }}-*.raucb
          retention-days: 30

      - name: Build summary
        run: |
          echo "## ${{ matrix.board.id }} build summary" >> "$GITHUB_STEP_SUMMARY"
          echo "| File | Size |" >> "$GITHUB_STEP_SUMMARY"
          echo "|:-|:-|" >> "$GITHUB_STEP_SUMMARY"
          for f in output/images/baos_*; do
            echo "| $(basename $f) | $(du -bh $f | cut -f1) |" >> "$GITHUB_STEP_SUMMARY"
          done

  # -----------------------------------------------------------------------
  # 4. Publish GitHub Release
  # -----------------------------------------------------------------------
  release:
    name: Publish BAOS ${{ needs.prepare.outputs.baos_version }}
    runs-on: ubuntu-22.04
    needs:
      - prepare
      - build

    steps:
      - name: Checkout ba-operating-system (for composite actions)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.BAOS_OS_REPO }}
          token: ${{ secrets.BAOS_BUILD_TOKEN }}
          ref: baos-main

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: baos_*
          merge-multiple: true
          path: /tmp/baos-release/

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ needs.prepare.outputs.baos_version }}
          name:       "BAOS ${{ needs.prepare.outputs.baos_version }}"
          repository: ${{ env.BAOS_BUILD_REPO }}
          token:      ${{ secrets.BAOS_BUILD_TOKEN }}
          body: |
            ## Boat Assistant OS ${{ needs.prepare.outputs.baos_version }}

            Based on **Home Assistant OS ${{ needs.prepare.outputs.haos_version }}**
            with HA Core ${{ needs.prepare.outputs.core_version }}.

            ### Install via Raspberry Pi Imager
            Open RPi Imager, choose **Other specific-purpose OS → Home automation → Boat Assistant**,
            or use the direct download links below.

            ### Trigger
            ${{ needs.prepare.outputs.trigger_source }}
          files: /tmp/baos-release/**

      - name: Get release timestamp
        id: release_time
        run: echo "iso=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Update RPi Imager JSON in ba-version
        uses: "./.github/actions/bump-rpi-imager-version"
        with:
          version:      ${{ needs.prepare.outputs.baos_version }}
          release-date: ${{ steps.release_time.outputs.iso }}
          token:        ${{ secrets.BAOS_BUILD_TOKEN }}
